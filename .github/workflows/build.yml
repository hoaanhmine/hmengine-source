name: Build HMEngine

on:
  push:
    branches: [main, master]
    paths:
      - 'source/**'
      - 'assets/**'
      - 'Project.xml'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'source/**'
      - 'assets/**'
      - 'Project.xml'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    continue-on-error: true

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.6

      - name: Restore Haxelib Cache
        uses: actions/cache@v3
        with:
          path: C:\haxelib
          key: ${{ runner.os }}-haxelib-${{ hashFiles('**/dependencies.hxpkg') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-haxelib-

      - name: Install Dependencies
        shell: powershell
        run: |
          haxelib setup C:\haxelib
          haxelib --global install hxpkg
          haxelib run hxpkg install --global
          haxelib install hxcpp

      - name: Restore Build Cache
        uses: actions/cache@v3
        with:
          path: |
            export/release/windows/haxe
            export/release/windows/obj
          key: ${{ runner.os }}-build-latest
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Build Windows
        run: haxelib run lime build windows

      - name: Save Build Cache
        uses: actions/cache/save@v3
        if: always()
        with:
          path: |
            export/release/windows/haxe
            export/release/windows/obj
            .hx/
          key: ${{ runner.os }}-build-latest

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HMEngine-Windows-Build
          path: export/release/windows/bin

  build-linux:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.6

      - name: Restore Haxelib Cache
        uses: actions/cache@v3
        with:
          path: ~/.haxelib
          key: ${{ runner.os }}-haxelib-${{ hashFiles('**/dependencies.hxpkg') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-haxelib-

      - name: Install Dependencies
        run: |
          haxelib --global install hxpkg
          haxelib run hxpkg install --global
          haxelib install hxcpp

      - name: Setup Lime for Linux
        run: echo "y" | haxelib run lime setup linux

      - name: Setup VLC for Linux
        run: sudo apt-get update && sudo apt-get install -y vlc libvlc-dev libvlccore-dev vlc-bin

      - name: Restore Build Cache
        uses: actions/cache@v3
        with:
          path: |
            export/release/linux/haxe
            export/release/linux/obj
            .hx/
          key: ${{ runner.os }}-build-latest
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Build Linux
        run: haxelib run lime build linux

      - name: Save Build Cache
        uses: actions/cache/save@v3
        if: always()
        with:
          path: |
            export/release/linux/haxe
            export/release/linux/obj
          key: ${{ runner.os }}-build-latest

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: HMEngine-Linux-Build
          path: export/release/linux/bin
          if-no-files-found: warn

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Zip Artifacts
        run: |
          cd artifacts
          tar -czf ../HMEngine-Windows-Build.tar.gz HMEngine-Windows-Build/
          tar -czf ../HMEngine-Linux-Build.tar.gz HMEngine-Linux-Build/
          cd ..
          ls -lh *.tar.gz

      - name: Delete Old Pre-release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            
            for (const release of releases.data) {
              if (release.prerelease && release.tag_name === 'nightly') {
                await github.rest.repos.deleteRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: release.id
                });
                
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `tags/${release.tag_name}`
                });
                
                console.log('Deleted old nightly release');
              }
            }

      - name: Create Pre-release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: nightly
          name: 'Nightly Build - ${{ github.run_number }}'
          prerelease: true
          generate_release_notes: true
          files: |
            HMEngine-Windows-Build.tar.gz
            HMEngine-Linux-Build.tar.gz
          token: ${{ secrets.GITHUB_TOKEN }}