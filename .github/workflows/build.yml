name: Build HMEngine

on:
  push:
    branches: [main, master]
    paths:
      - 'source/**'
      - 'assets/**'
      - 'Project.xml'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'source/**'
      - 'assets/**'
      - 'Project.xml'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    continue-on-error: true

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.6

      - name: Restore Haxelib Cache
        uses: actions/cache@v3
        with:
          path: C:\haxelib
          key: ${{ runner.os }}-haxelib-${{ hashFiles('**/dependencies.hxpkg') }}
          restore-keys: |
            ${{ runner.os }}-haxelib-

      - name: Install Dependencies
        shell: powershell
        run: |
          haxelib setup C:\haxelib
          haxelib --global install hxpkg
          haxelib run hxpkg install --global
          haxelib install hxcpp

      - name: Restore Build Cache
        uses: actions/cache@v3
        with:
          path: |
            export/
            .hx/
          key: ${{ runner.os }}-build-${{ hashFiles('source/**', 'assets/**', 'Project.xml') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Build Windows
        run: haxelib run lime build windows

      - name: Save Build Cache
        uses: actions/cache/save@v3
        if: always()
        with:
          path: |
            export/
            .hx/
          key: ${{ runner.os }}-build-${{ hashFiles('source/**', 'assets/**', 'Project.xml') }}

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HMEngine-Windows-Build
          path: export/release/windows/bin

  build-linux:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.6

      - name: Restore Haxelib Cache
        uses: actions/cache@v3
        with:
          path: ~/.haxelib
          key: ${{ runner.os }}-haxelib-${{ hashFiles('**/dependencies.hxpkg') }}
          restore-keys: |
            ${{ runner.os }}-haxelib-

      - name: Install Dependencies
        run: |
          haxelib --global install hxpkg
          haxelib run hxpkg install --global
          haxelib install hxcpp

      - name: Setup Lime for Linux
        run: echo "y" | haxelib run lime setup linux

      - name: Restore Build Cache
        uses: actions/cache@v3
        with:
          path: |
            export/
            .hx/
          key: ${{ runner.os }}-build-${{ hashFiles('source/**', 'assets/**', 'Project.xml') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Build Linux
        run: haxelib run lime build linux

      - name: Save Build Cache
        uses: actions/cache/save@v3
        if: always()
        with:
          path: |
            export/
            .hx/
          key: ${{ runner.os }}-build-${{ hashFiles('source/**', 'assets/**', 'Project.xml') }}

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HMEngine-Linux-Build
          path: export/linux/bin